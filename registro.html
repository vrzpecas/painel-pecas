<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Registro de Peça</title>

<style>
body{
  background:#0b0b0b;
  color:#fff;
  font-family:Arial;
  margin:0;
}

.header{
  padding:20px;
  border-bottom:2px solid red;
  display:flex;
  align-items:center;
}

.menu-btn{
  font-size:24px;
  cursor:pointer;
  margin-right:15px;
}

.sidebar{
  position:fixed;
  left:-250px;
  top:0;
  width:250px;
  height:100%;
  background:#111;
  transition:0.3s;
  padding-top:20px;
}

.sidebar a{
  display:block;
  padding:15px;
  color:#fff;
  text-decoration:none;
}

.sidebar a:hover{
  background:red;
}

.container{
  padding:20px;
}

label{
  font-size:13px;
  color:#aaa;
}

input{
  display:block;
  width:100%;
  margin-bottom:15px;
  padding:10px;
  background:#1a1a1a;
  border:none;
  color:#fff;
}

button{
  padding:12px;
  background:red;
  border:none;
  color:#fff;
  cursor:pointer;
  width:100%;
}
</style>
</head>

<body>

<div class="sidebar" id="sidebar">
  <a href="index.html">Controle de Peças</a>
  <a href="estoque.html">Estoque</a>
  <a href="registro.html">Registro de Peça</a>
</div>

<div class="header">
  <div class="menu-btn" onclick="toggleMenu()">☰</div>
  <h2>Registro de Peça</h2>
</div>

<div class="container">

<label>NUMERAÇÃO</label>
<input id="numeracao">

<label>MARCA</label>
<input id="marca">

<label>MODELO</label>
<input id="modelo">

<label>OS</label>
<input id="os">

<label>PEÇA</label>
<input id="peca">

<label>CODIGO</label>
<input id="codigo">

<label>VALOR</label>
<input id="valor">

<label>DATA RETIRADA</label>
<input id="dataRetirada">

<label>OS RECEPTOR</label>
<input id="osReceptor">

<label>RESPONSAVEL</label>
<input id="responsavel">

<button onclick="salvar()">Salvar Peça</button>

</div>

<script>
function toggleMenu(){
  let menu = document.getElementById("sidebar");
  menu.style.left = menu.style.left === "0px" ? "-250px" : "0px";
}

function salvar(){

let nova = {
  numeracao: document.getElementById("numeracao").value,
  marca: document.getElementById("marca").value,
  modelo: document.getElementById("modelo").value,
  os: document.getElementById("os").value,
  peca: document.getElementById("peca").value,
  codigo: document.getElementById("codigo").value,
  valor: document.getElementById("valor").value,
  dataRetirada: document.getElementById("dataRetirada").value,
  osReceptor: document.getElementById("osReceptor").value,
  responsavel: document.getElementById("responsavel").value
};

let lista = JSON.parse(localStorage.getItem("estoque")) || [];

lista.push(nova);

localStorage.setItem("estoque", JSON.stringify(lista));

alert("Peça registrada com sucesso!");

window.location.href = "estoque.html";
}
</script>

</body>
</html>
