
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel de Peças</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
body{font-family:Arial;margin:0;background:#0f172a;color:white}
header{background:#020617;padding:18px;font-size:22px}
.container{padding:25px;max-width:1200px;margin:auto}

.cards{display:flex;gap:20px;margin-bottom:30px;flex-wrap:wrap}
.card{background:#1e293b;padding:20px;border-radius:10px;flex:1;min-width:200px}
.card span{color:#94a3b8;font-size:14px}
.card h2{margin:5px 0 0 0;font-size:34px}

.tabs{margin-bottom:15px}
.tabs button{
background:#1e293b;border:none;padding:10px 16px;margin-right:10px;
color:white;border-radius:6px;cursor:pointer
}

.section{
background:#1e293b;padding:20px;border-radius:10px;margin-top:10px
}

table{
width:100%;border-collapse:collapse;margin-top:10px
}

th,td{
padding:10px;border-bottom:1px solid #334155;font-size:14px
}

th{color:#94a3b8}
.hidden{display:none}
</style>
</head>

<body>

<header>Painel de Peças</header>

<div class="container">

<div class="cards">
<div class="card"><span>Total peças</span><h2 id="total">0</h2></div>
<div class="card"><span>Atrasadas</span><h2 id="atrasadas">0</h2></div>
<div class="card"><span>No prazo</span><h2 id="prazo">0</h2></div>
<div class="card"><span>Entregues</span><h2 id="entregues">0</h2></div>
</div>

<div class="tabs">
<button onclick="mostrar('atrasadasTab')">Peças atrasadas</button>
<button onclick="mostrar('prazoTab')">Dentro do prazo</button>
<button onclick="mostrar('naoTab')">Não solicitadas</button>
<button onclick="mostrar('osTab')">Buscar OS</button>
</div>

<div id="atrasadasTab" class="section">
<h3>Peças atrasadas</h3>
<table>
<thead>
<tr>
<th>OS</th>
<th>Peça</th>
<th>Fornecedor</th>
<th>Prazo</th>
<th>Dias atraso</th>
</tr>
</thead>
<tbody id="tAtrasadas"></tbody>
</table>
</div>

<div id="prazoTab" class="section hidden">
<h3>Peças dentro do prazo</h3>
<table>
<thead>
<tr>
<th>OS</th>
<th>Peça</th>
<th>Fornecedor</th>
<th>Prazo</th>
</tr>
</thead>
<tbody id="tPrazo"></tbody>
</table>
</div>

<div id="naoTab" class="section hidden">
<h3>Peças não solicitadas / em cotação</h3>
<table>
<thead>
<tr>
<th>OS</th>
<th>Peça</th>
<th>Fornecedor</th>
<th>Valor</th>
</tr>
</thead>
<tbody id="tNao"></tbody>
</table>
</div>

<div id="osTab" class="section hidden">
<h3>Buscar OS</h3>
<select id="osSelect" onchange="buscarOS()"></select>
<table>
<thead>
<tr>
<th>Peça</th>
<th>Fornecedor</th>
<th>Prazo</th>
<th>Status</th>
<th>Dias atraso</th>
</tr>
</thead>
<tbody id="tOS"></tbody>
</table>
</div>

</div>

<script>

const csvURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQXT05p1mxD9mFsRFqzeG4ebXF10jVJra0AncChPKXz6UcrtpYFMZ31qMpcSCKnvQ/pub?gid=1723717147&single=true&output=csv";

let dados=[];

function parseBRDate(str){
if(!str) return null;
let parts=str.split("/");
if(parts.length!==3) return null;
return new Date(parts[2], parts[1]-1, parts[0]);
}

function formatarData(d){
if(!d) return "-";
return d.toLocaleDateString("pt-BR");
}

function mostrar(id){
document.querySelectorAll(".section").forEach(s=>s.classList.add("hidden"));
document.getElementById(id).classList.remove("hidden");
}

function carregar(){

Papa.parse(csvURL,{
download:true,
header:true,
skipEmptyLines:true,

complete:function(res){

dados=res.data;

let total=dados.length;
let atrasadas=0;
let prazo=0;
let entregues=0;

let hoje=new Date();

let tA=document.getElementById("tAtrasadas");
let tP=document.getElementById("tPrazo");
let tN=document.getElementById("tNao");

tA.innerHTML="";
tP.innerHTML="";
tN.innerHTML="";

dados.forEach(r=>{

let prazoEntrega=parseBRDate(r["PRAZO DE ENTREGA"]);
let entrega=r["DATA DE ENTREGA"];
let valor=(r["VALOR"]||"").toString().toLowerCase();

if(entrega){
entregues++;
}
else if(prazoEntrega){

if(prazoEntrega<hoje){

atrasadas++;
let diff=Math.floor((hoje-prazoEntrega)/(1000*60*60*24));

let tr=document.createElement("tr");
tr.innerHTML=`
<td>${r["OS"]}</td>
<td>${r["DESCRIÇÃO DA PEÇA"]}</td>
<td>${r["FORNECEDOR"]}</td>
<td>${formatarData(prazoEntrega)}</td>
<td>${diff}</td>`;

tA.appendChild(tr);

}else{

prazo++;
let tr=document.createElement("tr");
tr.innerHTML=`
<td>${r["OS"]}</td>
<td>${r["DESCRIÇÃO DA PEÇA"]}</td>
<td>${r["FORNECEDOR"]}</td>
<td>${formatarData(prazoEntrega)}</td>`;

tP.appendChild(tr);

}

}

if(!valor || valor.includes("cot")){
let tr=document.createElement("tr");
tr.innerHTML=`
<td>${r["OS"]}</td>
<td>${r["DESCRIÇÃO DA PEÇA"]}</td>
<td>${r["FORNECEDOR"]}</td>
<td>${r["VALOR"]||"vazio"}</td>`;
tN.appendChild(tr);
}

});

document.getElementById("total").innerText=total;
document.getElementById("atrasadas").innerText=atrasadas;
document.getElementById("prazo").innerText=prazo;
document.getElementById("entregues").innerText=entregues;

popularOS();

}

});

}

function popularOS(){

let select=document.getElementById("osSelect");
select.innerHTML="<option>Escolha uma OS</option>";

let lista=[...new Set(dados.map(r=>r["OS"]))];

lista.sort().forEach(os=>{
let op=document.createElement("option");
op.value=os;
op.text=os;
select.appendChild(op);
});

}

function buscarOS(){

let os=document.getElementById("osSelect").value;
let tabela=document.getElementById("tOS");
tabela.innerHTML="";

let hoje=new Date();

dados.forEach(r=>{

if(r["OS"]==os){

let prazoEntrega=parseBRDate(r["PRAZO DE ENTREGA"]);
let entrega=r["DATA DE ENTREGA"];

let status="NO PRAZO";
let atraso=0;

if(entrega) status="ENTREGUE";
else if(prazoEntrega && prazoEntrega<hoje){
status="ATRASADO";
atraso=Math.floor((hoje-prazoEntrega)/(1000*60*60*24));
}

let tr=document.createElement("tr");
tr.innerHTML=`
<td>${r["DESCRIÇÃO DA PEÇA"]}</td>
<td>${r["FORNECEDOR"]}</td>
<td>${formatarData(prazoEntrega)}</td>
<td>${status}</td>
<td>${atraso}</td>`;

tabela.appendChild(tr);

}

});

}

carregar();
setInterval(carregar,30000);

</script>

</body>
</html>
