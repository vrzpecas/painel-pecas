
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel de Peças</title>

<style>
body{font-family:Arial;margin:0;background:#0f172a;color:white;}
header{background:#020617;padding:18px;font-size:22px;}
.container{padding:25px;}
.cards{display:flex;gap:20px;margin-bottom:30px;flex-wrap:wrap;}
.card{background:#1e293b;padding:20px;border-radius:10px;width:220px;}
.card h2{margin:0;font-size:30px;}
.section{background:#1e293b;padding:20px;border-radius:10px;margin-bottom:25px;}
table{width:100%;border-collapse:collapse;}
th,td{padding:8px;border-bottom:1px solid #334155;font-size:14px;}
th{color:#94a3b8;text-align:left;}
</style>
</head>

<body>

<header>Painel de Peças (Google Sheets)</header>

<div class="container">

<div class="cards">
<div class="card"><span>Total peças</span><h2 id="total">0</h2></div>
<div class="card"><span>Atrasadas</span><h2 id="atrasadas">0</h2></div>
<div class="card"><span>No prazo</span><h2 id="prazo">0</h2></div>
<div class="card"><span>Entregues</span><h2 id="entregues">0</h2></div>
</div>

<div class="section">
<h3>Peças atrasadas</h3>
<table>
<thead>
<tr>
<th>OS</th>
<th>Peça</th>
<th>Fornecedor</th>
<th>Prazo</th>
<th>Dias atraso</th>
</tr>
</thead>
<tbody id="atrasadasTabela"></tbody>
</table>
</div>

</div>

<script>

const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQXT05p1mxD9mFsRFqzeG4ebXF10jVJra0AncChPKXz6UcrtpYFMZ31qMpcSCKnvQ/gviz/tq?tqx=out:json&gid=1723717147";

function formatDate(d) {
if(!d) return "-";
let date = new Date(d);
if(isNaN(date)) return "-";
let day = String(date.getDate()).padStart(2,'0');
let month = String(date.getMonth()+1).padStart(2,'0');
let year = date.getFullYear();
return `${day}/${month}/${year}`;
}

function carregar() {

fetch(url)
.then(r=>r.text())
.then(text=>{

// remover wrapper do Google
let json = JSON.parse(text.substr(47).slice(0,-2));

let cols = json.table.cols.map(c=>c.label);
let rows = json.table.rows;

let dados = rows.map(r=>{
let obj={};
r.c.forEach((c,i)=> obj[cols[i]] = c ? c.v : "");
return obj;
});

let total = dados.length;
let atrasadas = 0;
let prazo = 0;
let entregues = 0;

let today = new Date();

let table = document.getElementById("atrasadasTabela");
table.innerHTML = "";

dados.forEach(r => {

let prazoEntrega = new Date(r["PRAZO DE ENTREGA"]);
let entrega = r["DATA DE ENTREGA"];

if(entrega) {
entregues++;
}
else if(!isNaN(prazoEntrega)) {

if(prazoEntrega < today) {

atrasadas++;
let diff = Math.floor((today - prazoEntrega)/(1000*60*60*24));

let tr = document.createElement("tr");
tr.innerHTML = `
<td>${r["OS"]||""}</td>
<td>${r["DESCRIÇÃO DA PEÇA"]||""}</td>
<td>${r["FORNECEDOR"]||""}</td>
<td>${formatDate(prazoEntrega)}</td>
<td>${diff}</td>
`;

table.appendChild(tr);

}
else {
prazo++;
}

}

});

document.getElementById("total").innerText = total;
document.getElementById("atrasadas").innerText = atrasadas;
document.getElementById("prazo").innerText = prazo;
document.getElementById("entregues").innerText = entregues;

});

}

carregar();
setInterval(carregar,20000);

</script>

</body>
</html>
