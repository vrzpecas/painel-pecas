
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel Inteligente de Peças</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>

body{
font-family:'Inter',sans-serif;
margin:0;
background:#0f0f10;
color:#fff;
}

header{
background:#000;
padding:22px;
font-size:22px;
font-weight:600;
border-bottom:3px solid #e30613;
}

.container{
padding:30px;
max-width:1300px;
margin:auto;
}

.cards{
display:flex;
gap:20px;
margin-bottom:30px;
flex-wrap:wrap;
}

.card{
background:#18181b;
padding:24px;
border-radius:16px;
flex:1;
min-width:200px;
border:1px solid #27272a;
box-shadow:0 10px 20px rgba(0,0,0,0.35);
}

.card span{
color:#a1a1aa;
font-size:13px;
}

.card h2{
margin:6px 0 0 0;
font-size:32px;
}

.tabs button{
background:#18181b;
border:1px solid #27272a;
padding:10px 18px;
margin-right:10px;
color:#fff;
border-radius:10px;
cursor:pointer;
}

.tabs button:hover{
background:#e30613;
}

.section{
background:#18181b;
padding:24px;
border-radius:16px;
margin-top:10px;
border:1px solid #27272a;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

th,td{
padding:12px;
border-bottom:1px solid #27272a;
}

.hidden{display:none}

/* CHAT */

#aiButton{
position:fixed;
bottom:25px;
right:25px;
background:#e30613;
border:none;
color:#fff;
padding:16px 18px;
border-radius:50%;
font-size:18px;
cursor:pointer;
box-shadow:0 6px 15px rgba(0,0,0,0.4);
}

#aiChat{
position:fixed;
bottom:90px;
right:25px;
width:360px;
background:#18181b;
border-radius:16px;
border:1px solid #27272a;
display:none;
flex-direction:column;
overflow:hidden;
}

#chatMessages{
height:320px;
overflow:auto;
padding:15px;
font-size:14px;
}

#chatInput{
border:none;
padding:12px;
width:100%;
outline:none;
background:#0f0f10;
color:#fff;
}

.messageUser{color:#ddd;margin-bottom:8px}
.messageBot{color:#9cdcfe;margin-bottom:12px}

</style>
</head>

<body>

<header>Painel Inteligente de Peças</header>

<div class="container">

<div class="cards">
<div class="card"><span>Total peças</span><h2 id="total">0</h2></div>
<div class="card"><span>Atrasadas</span><h2 id="atrasadas">0</h2></div>
<div class="card"><span>No prazo</span><h2 id="prazo">0</h2></div>
<div class="card"><span>Entregues</span><h2 id="entregues">0</h2></div>
</div>

</div>

<button id="aiButton" onclick="toggleAI()">AI</button>

<div id="aiChat">
<div id="chatMessages"></div>
<input id="chatInput" placeholder="Pergunte algo..." onkeydown="if(event.key==='Enter')responderAI()">
</div>

<script>

const csvURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQXT05p1mxD9mFsRFqzeG4ebXF10jVJra0AncChPKXz6UcrtpYFMZ31qMpcSCKnvQ/pub?gid=1723717147&single=true&output=csv";

let dados=[];

function parseBRDate(str){
if(!str) return null;
let p=str.split("/");
if(p.length!==3) return null;
return new Date(p[2],p[1]-1,p[0]);
}

function sameDay(a,b){
return a && b &&
a.getDate()==b.getDate() &&
a.getMonth()==b.getMonth() &&
a.getFullYear()==b.getFullYear();
}

function toggleAI(){
let chat=document.getElementById("aiChat");
chat.style.display=chat.style.display==="flex"?"none":"flex";
}

function carregar(){

Papa.parse(csvURL,{
download:true,
header:true,
skipEmptyLines:true,
complete:function(res){

dados=res.data;

let hoje=new Date();

let atrasadas=0;
let prazo=0;
let entregues=0;

dados.forEach(r=>{

let entrega=parseBRDate(r["DATA DE ENTREGA"]);
let prazoEntrega=parseBRDate(r["PRAZO DE ENTREGA"]);

if(entrega) entregues++;

if(!entrega && prazoEntrega){
if(prazoEntrega<hoje) atrasadas++;
else prazo++;
}

});

document.getElementById("total").innerText=dados.length;
document.getElementById("atrasadas").innerText=atrasadas;
document.getElementById("prazo").innerText=prazo;
document.getElementById("entregues").innerText=entregues;

}
});

}

function listarAtrasadas(){

let hoje=new Date();
let lista=[];

dados.forEach(r=>{

let entrega=parseBRDate(r["DATA DE ENTREGA"]);
let prazo=parseBRDate(r["PRAZO DE ENTREGA"]);

if(!entrega && prazo && prazo<hoje){
lista.push("OS "+r["OS"]+" - "+r["DESCRIÇÃO DA PEÇA"]);
}

});

if(lista.length===0) return "Nenhuma peça está atrasada.";
return "Peças atrasadas:\n"+lista.slice(0,10).join("\n");

}

function pecasDaOS(os){

let lista=dados.filter(r=>String(r["OS"])===os);

if(lista.length===0) return "Não encontrei essa OS.";

let resposta="Peças da OS "+os+":\n";

lista.forEach(r=>{
resposta+= "- "+r["DESCRIÇÃO DA PEÇA"]+" ("+(r["FORNECEDOR"]||"sem fornecedor")+")\n";
});

return resposta;

}

function fornecedorMaisAtrasou(){

let contagem={};
let hoje=new Date();

dados.forEach(r=>{

let entrega=parseBRDate(r["DATA DE ENTREGA"]);
let prazo=parseBRDate(r["PRAZO DE ENTREGA"]);

if(!entrega && prazo && prazo<hoje){

let f=r["FORNECEDOR"]||"Desconhecido";

if(!contagem[f]) contagem[f]=0;

contagem[f]++;

}

});

let top=Object.entries(contagem).sort((a,b)=>b[1]-a[1])[0];

if(!top) return "Nenhum fornecedor com atraso.";

return "Fornecedor com mais atrasos: "+top[0]+" ("+top[1]+" peças).";

}

function responderAI(){

let input=document.getElementById("chatInput");
let pergunta=input.value.toLowerCase();

let resposta="Não entendi. Exemplos: 'peças atrasadas', 'peças da OS 1234', 'fornecedor que mais atrasou'.";

if(pergunta.includes("atrasad"))
resposta=listarAtrasadas();

else if(pergunta.includes("fornecedor") && pergunta.includes("atras"))
resposta=fornecedorMaisAtrasou();

else if(pergunta.includes("os")){

let num=pergunta.match(/\d+/);

if(num) resposta=pecasDaOS(num[0]);

}

let box=document.getElementById("chatMessages");

box.innerHTML+= '<div class="messageUser"><b>Você:</b> '+input.value+'</div>';
box.innerHTML+= '<div class="messageBot"><b>Assistente:</b><br>'+resposta.replace(/\n/g,"<br>")+'</div>';

input.value="";
box.scrollTop=box.scrollHeight;

}

carregar();
setInterval(carregar,30000);

</script>

</body>
</html>
