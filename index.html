
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Relatório de Peças</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body{
font-family:'Poppins',sans-serif;
margin:0;
background:#0f0f10;
color:white;
}

header{
background:black;
padding:20px;
font-size:22px;
border-bottom:3px solid red;
}

.container{
padding:30px;
max-width:1300px;
margin:auto;
}

.cards{
display:flex;
gap:20px;
flex-wrap:wrap;
margin-bottom:30px;
}

.card{
background:#18181b;
padding:25px;
border-radius:16px;
flex:1;
min-width:200px;
border:1px solid #27272a;
}

.card span{
font-size:13px;
color:#a1a1aa;
}

.card h2{
margin:5px 0 0 0;
font-size:32px;
}

.tabs button{
background:#18181b;
border:1px solid #27272a;
padding:10px 18px;
margin-right:10px;
color:white;
border-radius:10px;
cursor:pointer;
}

.section{
background:#18181b;
padding:25px;
border-radius:16px;
margin-top:10px;
border:1px solid #27272a;
}

.hidden{display:none}

/* CHAT */

#aiButton{
position:fixed;
bottom:25px;
right:25px;
background:red;
border:none;
color:white;
padding:16px 18px;
border-radius:50%;
font-size:18px;
cursor:pointer;
}

#aiChat{
position:fixed;
bottom:90px;
right:25px;
width:360px;
background:#18181b;
border-radius:16px;
border:1px solid #27272a;
display:none;
flex-direction:column;
overflow:hidden;
}

#chatMessages{
height:300px;
overflow:auto;
padding:15px;
}

#chatInput{
border:none;
padding:12px;
width:100%;
outline:none;
background:#0f0f10;
color:white;
}
</style>
</head>

<body>

<header>Relatório de Peças</header>

<div class="container">

<div class="cards">
<div class="card"><span>Total peças</span><h2 id="total">0</h2></div>
<div class="card"><span>Atrasadas</span><h2 id="atrasadas">0</h2></div>
<div class="card"><span>No prazo</span><h2 id="prazo">0</h2></div>
<div class="card"><span>Entregues</span><h2 id="entregues">0</h2></div>
</div>

<div class="tabs">
<button onclick="mostrar('hojeTab')">Movimento hoje</button>
<button onclick="mostrar('atrasadasTab')">Atrasadas</button>
<button onclick="mostrar('prazoTab')">No prazo</button>
<button onclick="mostrar('naoTab')">Não solicitadas</button>
</div>

<div id="hojeTab" class="section">
<h3>Movimento do dia</h3>
<p>Dados carregados da planilha.</p>
</div>

</div>

<button id="aiButton" onclick="toggleAI()">AI</button>

<div id="aiChat">
<div id="chatMessages"></div>
<input id="chatInput" placeholder="Pergunte algo..." onkeydown="if(event.key==='Enter')responderAI()">
</div>

<script>

function mostrar(id){
document.querySelectorAll(".section").forEach(s=>s.classList.add("hidden"))
let el=document.getElementById(id)
if(el) el.classList.remove("hidden")
}

function toggleAI(){
let chat=document.getElementById("aiChat")
chat.style.display=chat.style.display==="flex"?"none":"flex"
}

async function responderAI(){

let input=document.getElementById("chatInput")
let pergunta=input.value

if(!pergunta) return

let box=document.getElementById("chatMessages")

box.innerHTML+= "<div><b>Você:</b> "+pergunta+"</div>"

try{

let res=await fetch("https://painel-pecas.vercel.app/api/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({pergunta})
})

let data=await res.json()

box.innerHTML+= "<div><b>Assistente:</b> "+(data.resposta || data.erro)+"</div>"

}catch(e){

box.innerHTML+= "<div><b>Erro:</b> "+e.message+"</div>"

}

input.value=""
box.scrollTop=box.scrollHeight

}

</script>

</body>
</html>
