<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel de Controle de Peças</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; margin: 0; background: #0f0f10; color: #fff; }
        header { background: #000; padding: 22px; font-size: 22px; font-weight: 600; border-bottom: 3px solid #e30613; }
        .container { padding: 30px; max-width: 1300px; margin: auto; }
        .cards { display: flex; gap: 20px; margin-bottom: 30px; flex-wrap: wrap; }
        .card { background: #18181b; padding: 24px; border-radius: 16px; flex: 1; min-width: 200px; border: 1px solid #27272a; box-shadow: 0 10px 20px rgba(0,0,0,0.35); }
        .card span { color: #a1a1aa; font-size: 13px; }
        .card h2 { margin: 6px 0 0 0; font-size: 32px; }
        .tabs button { background: #18181b; border: 1px solid #27272a; padding: 10px 18px; margin-right: 10px; color: #fff; border-radius: 10px; cursor: pointer; transition: 0.2s; }
        .tabs button:hover { background: #e30613; }
        .section { background: #18181b; padding: 24px; border-radius: 16px; margin-top: 10px; border: 1px solid #27272a; }
        .hidden { display: none; }
        .menu-item { display: block; padding: 15px; color: #fff; text-decoration: none; }
        .menu-item:hover { background: #e30613; }
        .os-container { display: flex; flex-direction: column; gap: 12px; margin-top: 15px; }
        .os-card { background: #111; border: 1px solid #2a2a2e; border-radius: 14px; padding: 16px; transition: 0.2s; }
        .os-top { display: flex; justify-content: space-between; margin-bottom: 8px; align-items: center; }
        .os-id { font-weight: 600; font-size: 15px; color: #fff; }
        .os-modelo { color: #e30613; font-weight: 700; margin-left: 8px; text-transform: uppercase; }
        .os-body { font-size: 13px; color: #a1a1aa; }
        .status { font-size: 11px; padding: 4px 10px; border-radius: 20px; font-weight: 500; }
        .status-solicitada { background: #6b7280; color: #fff; }
        .status-comprada { background: #2563eb; color: #fff; }
        .status-entregue { background: #16a34a; color: #fff; }
    </style>
</head>

<body>
    <div id="sideMenu" style="position:fixed; top:0; left:-250px; width:250px; height:100%; background:#0b0b0b; transition:0.3s; z-index:999;">
        <div style="display:flex; justify-content:space-between; align-items:center; padding:15px;">
            <span style="font-weight:bold; color:#fff;">Menu</span>
            <button onclick="toggleMenu()" style="background:none; border:none; color:#fff; font-size:20px; cursor:pointer;">✕</button>
        </div>
        <a href="index.html" class="menu-item">Solicitação de Peças</a>
        <a href="estoque.html" class="menu-item">Estoque</a>
        <a href="registro.html" class="menu-item">Registro de Peça</a>
    </div>

    <header style="display:flex; align-items:center; gap:15px;">
        <button onclick="toggleMenu()" style="background:transparent; border:none; color:#fff; font-size:22px; cursor:pointer;">☰</button>
        Painel de Controle de Peças
    </header>

    <div class="container">
        <div class="cards">
            <div class="card"><span>Total peças</span><h2 id="total">0</h2></div>
            <div class="card"><span>Atrasadas</span><h2 id="atrasadas">0</h2></div>
            <div class="card"><span>No prazo</span><h2 id="prazo">0</h2></div>
            <div class="card"><span>Entregues</span><h2 id="entregues">0</h2></div>
            <div class="card">
                <span>Top 3 solicitantes (mês)</span>
                <table style="width:100%;"><tbody id="rankingSolicitantes"></tbody></table>
            </div>
        </div>

        <div class="tabs">
            <button onclick="mostrar('hojeTab')">Movimento hoje</button>
            <button onclick="mostrar('atrasadasTab')">Atrasadas</button>
            <button onclick="mostrar('prazoTab')">No prazo</button>
            <button onclick="mostrar('naoTab')">Não solicitadas</button>
            <button onclick="mostrar('osTab')">Buscar OS</button>
        </div>

        <div id="hojeTab" class="section"><h3>Movimento do dia</h3><div id="tHoje" class="os-container"></div></div>
        <div id="atrasadasTab" class="section hidden"><h3>Peças atrasadas</h3><div id="tAtrasadas" class="os-container"></div></div>
        <div id="prazoTab" class="section hidden"><h3>Peças no prazo</h3><div id="tPrazo" class="os-container"></div></div>
        <div id="naoTab" class="section hidden"><h3>Não solicitadas / Cotação</h3><div id="tNao" class="os-container"></div></div>
        <div id="osTab" class="section hidden">
            <h3>Buscar OS</h3>
            <select id="osSelect" onchange="buscarOS()" style="padding:8px; background:#0f0f10; color:#fff; border:1px solid #27272a; border-radius:8px; width: 100%; max-width: 300px; margin-bottom: 15px;"></select>
            <div id="tOS" class="os-container"></div>
        </div>
    </div>

    <script>
        const csvURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQXT05p1mxD9mFsRFqzeG4ebXF10jVJra0AncChPKXz6UcrtpYFMZ31qMpcSCKnvQ/pub?gid=1419345505&single=true&output=csv";
        
        let dadosGerais = [];

        function mostrar(id) {
            document.querySelectorAll(".section").forEach(s => s.classList.add("hidden"));
            let el = document.getElementById(id);
            if (el) el.classList.remove("hidden");
        }

        // Conversor de data mais robusto para evitar erros de leitura
        function parseData(valor) {
            if (!valor) return null;
            let s = valor.toString().trim();
            if (s.includes("/")) {
                let p = s.split("/");
                return new Date(p[2], p[1]-1, p[0]);
            }
            if (s.includes("-")) {
                let p = s.split("-");
                return p[0].length === 4 ? new Date(p[0], p[1]-1, p[2]) : new Date(p[2], p[1]-1, p[0]);
            }
            return null;
        }

        function mesmaData(d1, d2) {
            return d1 && d2 && d1.getDate() === d2.getDate() && d1.getMonth() === d2.getMonth() && d1.getFullYear() === d2.getFullYear();
        }

        function criarCardAgrupado(os, modelo, itens, corBorda) {
            let itensHtml = itens.map(i => `
                <div style="margin-bottom: 10px; border-bottom: 1px solid #27272a; padding-bottom: 8px; display: flex; justify-content: space-between; align-items: center;">
                  <div>
                    <div style="font-size: 14px; font-weight: 500;"><b>Peça:</b> ${i.desc}</div>
                    <div style="font-size: 12px; color: #a1a1aa;">${i.detalhes || ""}</div>
                  </div>
                  <span class="status ${i.classe}">${i.status}</span>
                </div>
            `).join('');

            return `
            <div class="os-card">
              <div class="os-top" style="border-bottom: 2px solid ${corBorda}; margin-bottom: 12px; padding-bottom: 6px;">
                <span class="os-id">OS ${os} <span class="os-modelo">${modelo}</span></span>
                <span style="font-size: 12px; color: #a1a1aa;">${itens.length} item(s)</span>
              </div>
              <div class="os-body">${itensHtml}</div>
            </div>`;
        }

        function carregar() {
            Papa.parse(csvURL + "&t=" + new Date().getTime(), {
                download: true, header: true, skipEmptyLines: true,
                complete: function(res) {
                    dadosGerais = res.data;
                    processar();
                }
            });
        }

        function processar() {
            const hoje = new Date();
            hoje.setHours(0,0,0,0);

            let sH = 0, cH = 0, eH = 0, vH = 0, atr = 0, prz = 0, ent = 0;
            const tH = document.getElementById("tHoje"), tA = document.getElementById("tAtrasadas"), tP = document.getElementById("tPrazo"), tN = document.getElementById("tNao");
            
            tH.innerHTML = ""; tA.innerHTML = ""; tP.innerHTML = ""; tN.innerHTML = "";

            let gH = {}, gA = {}, gP = {}, gN = {};

            dadosGerais.forEach(r => {
                const os = r["OS"] || "S/N";
                const modelo = (r["MODELO"] || r["VEÍCULO"] || "N/A").toUpperCase();
                const dSolic = parseData(r["DATA SOLICITAÇÃO"] || r["DATA DE SOLICITAÇÃO"]);
                const dCompra = parseData(r["DATA DA COMPRA"]);
                const dEntrega = parseData(r["DATA DE ENTREGA"]);
                
                // Busca automática por qualquer coluna que tenha "PRAZO" no nome
                let pE = null;
                for (let key in r) {
                    if (key.toUpperCase().includes("PRAZO")) { pE = parseData(r[key]); break; }
                }

                // 1. Movimento Hoje
                if (mesmaData(dSolic, hoje) || mesmaData(dCompra, hoje) || mesmaData(dEntrega, hoje)) {
                    if (mesmaData(dSolic, hoje)) sH++;
                    if (mesmaData(dCompra, hoje)) cH++;
                    if (mesmaData(dEntrega, hoje)) eH++;
                    if (!gH[os]) gH[os] = { m: modelo, i: [] };
                    gH[os].i.push({ desc: r["DESCRIÇÃO DA PEÇA"], status: "Movimentado", classe: "status-comprada" });
                }

                // 2. Lógica de Atrasos e Prazos
                if (dEntrega) {
                    ent++;
                } else if (pE) {
                    pE.setHours(0,0,0,0);
                    if (hoje > pE) {
                        atr++;
                        if (!gA[os]) gA[os] = { m: modelo, i: [] };
                        gA[os].i.push({ desc: r["DESCRIÇÃO DA PEÇA"], status: "ATRASADA", classe: "status-solicitada", detalhes: "Vencimento: " + pE.toLocaleDateString() });
                    } else {
                        prz++;
                        if (!gP[os]) gP[os] = { m: modelo, i: [] };
                        gP[os].i.push({ desc: r["DESCRIÇÃO DA PEÇA"], status: "NO PRAZO", classe: "status-entregue", detalhes: "Previsão: " + pE.toLocaleDateString() });
                    }
                }

                // 3. Não solicitadas
                let valor = (r["VALOR"] || "").toLowerCase();
                if (!valor || valor.includes("cot")) {
                    if (!gN[os]) gN[os] = { m: modelo, i: [] };
                    gN[os].i.push({ desc: r["DESCRIÇÃO DA PEÇA"], status: "COTAÇÃO", classe: "status-comprada" });
                }
            });

            // Renderizar
            for(let os in gH) tH.innerHTML += criarCardAgrupado(os, gH[os].m, gH[os].i, "#e30613");
            for(let os in gA) tA.innerHTML += criarCardAgrupado(os, gA[os].m, gA[os].i, "#6b7280");
            for(let os in gP) tP.innerHTML += criarCardAgrupado(os, gP[os].m, gP[os].i, "#16a34a");
            for(let os in gN) tN.innerHTML += criarCardAgrupado(os, gN[os].m, gN[os].i, "#2563eb");

            document.getElementById("total").innerText = dadosGerais.length;
            document.getElementById("atrasadas").innerText = atr;
            document.getElementById("prazo").innerText = prz;
            document.getElementById("entregues").innerText = ent;
            document.getElementById("solicitadasHoje").innerText = sH;
            document.getElementById("compradasHoje").innerText = cH;
            document.getElementById("entreguesHoje").innerText = eH;
            
            popularOS();
        }

        function popularOS() {
            const s = document.getElementById("osSelect");
            const lista = [...new Set(dadosGerais.map(r => r["OS"]))].filter(Boolean).sort();
            s.innerHTML = "<option value=''>Escolha uma OS</option>" + lista.map(os => `<option value="${os}">${os}</option>`).join('');
        }

        function buscarOS() {
            const os = document.getElementById("osSelect").value;
            const t = document.getElementById("tOS");
            t.innerHTML = "";
            const filtro = dadosGerais.filter(r => r["OS"] == os);
            if (filtro.length > 0) {
                t.innerHTML = criarCardAgrupado(os, filtro[0]["MODELO"] || "N/A", filtro.map(f => ({ desc: f["DESCRIÇÃO DA PEÇA"], status: "Info", classe: "status-comprada" })), "#fff");
            }
        }

        function toggleMenu() {
            let m = document.getElementById("sideMenu");
            m.style.left = m.style.left === "0px" ? "-250px" : "0px";
        }

        carregar();
        setInterval(carregar, 30000);
    </script>
</body>
</html>
