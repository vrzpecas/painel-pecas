<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Estoque FINAL PRO</title>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
body{font-family:Inter;background:#0b0b0c;color:#fff;margin:0}
header{padding:20px;border-bottom:2px solid #e30613;font-weight:600}
.container{padding:25px}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px}
.card{background:#121214;padding:15px;border-radius:12px;border:1px solid #222}
.card h2{color:#e30613;margin:5px 0}
.section{margin-top:25px}
table{width:100%;border-collapse:collapse;margin-top:10px}
th,td{padding:10px;border-bottom:1px solid #222}
select{padding:8px;background:#18181b;color:#fff;border:1px solid #333;border-radius:8px}
button{background:#18181b;border:1px solid #333;color:#fff;padding:8px 12px;border-radius:8px;cursor:pointer}
button:hover{background:#e30613}
.actions{margin-top:20px;display:flex;gap:10px}
.hidden{display:none}
canvas{background:#121214;padding:10px;border-radius:12px}
#menuBtn{position:fixed;top:15px;left:15px;background:#e30613;border:none;padding:8px;border-radius:6px}
#sideMenu{position:fixed;top:0;left:-200px;width:200px;height:100%;background:#0b0b0c;border-right:1px solid #222;padding-top:60px;transition:.3s}
#sideMenu a{display:block;padding:15px;color:#fff;text-decoration:none}
#sideMenu a:hover{background:#e30613}
</style>
</head>

<body>
<div id="sideMenu" style="
position:fixed;
top:0;
left:-250px;
width:250px;
height:100%;
background:#0b0b0b;
transition:0.3s;
z-index:999;
">

<div style="display:flex;justify-content:space-between;align-items:center;padding:15px;">
<span style="font-weight:bold;color:#fff;">Menu</span>
<button onclick="toggleMenu()" style="background:transparent;border:none;color:#fff;font-size:22px;cursor:pointer;">✕</button>
</div>

<a href="index.html" class="menu-item">Solicitação de Peças</a>
<a href="estoque.html" class="menu-item active">Estoque</a>
<a href="registro.html" class="menu-item">Registro de Peça</a>

</div>

<style>
.menu-item{
display:block;
padding:15px;
color:#fff;
text-decoration:none;
}
.menu-item:hover{
background:#e30613;
}
.menu-item.active{
background:#e30613;
}
</style>

<header style="display:flex;align-items:center;gap:15px;padding:20px;border-bottom:2px solid red;">
<button onclick="toggleMenu()" style="background:transparent;border:none;color:#fff;font-size:22px;cursor:pointer;">☰</button>
<h2 style="margin:0;">Estoque</h2>
</header>


<button id="menuBtn" onclick="toggleMenu()">☰</button>
<div id="sideMenu" onclick="fecharFora(event)">
<a href="index.html">Painel</a>
<a href="estoque.html">Estoque</a>
</div>

<header>Dashboard Completo + Inteligência</header>

<div class="container">

<div class="cards">
<div class="card">Total<h2 id="total"></h2></div>
<div class="card">Retiradas<h2 id="ret"></h2></div>
<div class="card">Hoje<h2 id="hoje"></h2></div>
<div class="card">Sem OS<h2 id="sem" style="color:#ff3b3b"></h2></div>
<div class="card">Reservado<h2 id="com" style="color:#00ff88"></h2></div>
</div>


<div class="section">
<h3>Ranking Top 5 carros</h3>
<table>
<thead><tr><th>Marca / Modelo</th><th>Quantidade</th></tr></thead>
<tbody id="rankingTabela"></tbody>
</table>
</div>

<div class="section">
<h3>Top 5 carros (inteligente)</h3>
<canvas id="grafico"></canvas>
</div>

<div class="actions">
<button onclick="mostrar('estoque')">Estoque</button>
<button onclick="mostrar('os')">Buscar OS</button>
<button onclick="mostrar('mov')">Movimento</button>
</div>

<div id="estoque" class="section hidden">
<table>
<thead><tr><th>NUM</th><th>MARCA</th><th>MODELO</th><th>OS</th><th>PEÇA</th><th>RESP</th></tr></thead>
<tbody id="tEstoque"></tbody>
</table>
</div>

<div id="os" class="section hidden">
<select id="osSelect" onchange="buscarOS()"></select>
<div id="resumo"></div>
<table><tbody id="tOS"></tbody></table>
</div>

<div id="mov" class="section hidden">
<select id="dataSelect" onchange="filtrarData()"></select>
<table><tbody id="tMov"></tbody></table>
</div>

</div>

<script>

let menu=false;
function toggleMenu(){
let m=document.getElementById("sideMenu");
menu=!menu;
m.style.left=menu?"0":"-200px";
}
function fecharFora(e){
if(e.target.id==="sideMenu"){toggleMenu()}
}

function mostrar(id){
["estoque","os","mov"].forEach(x=>document.getElementById(x).classList.add("hidden"));
document.getElementById(id).classList.remove("hidden");
}

const url="https://docs.google.com/spreadsheets/d/e/2PACX-1vTzcuYj91nTsIkmp86gpPBW1REkCitAvBtiLVB4RQvRniDi_cj5Pmd4mcylqNiipw/pub?gid=1283911979&single=true&output=csv";

let dados=[];

function reservado(v){return v && v.toLowerCase().includes("reservado")}

function normalizar(txt){
return (txt||"").toLowerCase()
.normalize("NFD").replace(/[\u0300-\u036f]/g,"")
.replace(/[^a-z0-9 ]/g,"")
.replace(/\s+/g," ")
.trim();
}

function chave(marca,modelo){
let base = normalizar(marca+" "+modelo);
base = base.replace(/\b20\d{2}\b/g,"");
return base;
}

function carregar(){
Papa.parse(url,{
download:true,
complete:(res)=>{

dados=res.data.slice(2).filter(r=>r[0]);

let hojeStr=new Date().toLocaleDateString("pt-BR");

let total=dados.length;
let ret=0, hoje=0, sem=0, com=0;

let tabela="";
let carros={};

dados.forEach(r=>{

let tem=reservado(r[3]);

if(r[7]) ret++;
if(r[7]==hojeStr) hoje++;

if(tem) com++; else sem++;

carros[chave(r[1],r[2])] = (carros[chave(r[1],r[2])]||0)+1;

tabela+=`<tr>
<td>${r[0]}</td>
<td>${r[1]}</td>
<td>${r[2]}</td>
<td>${tem?`<span style="color:#00ff88">${r[3]}</span>`:`<span style="color:#ff3b3b">SEM OS</span>`}</td>
<td>${r[4]}</td>
<td>${r[9]}</td>
</tr>`;

});

document.getElementById("total").innerText=total;
document.getElementById("ret").innerText=ret;
document.getElementById("hoje").innerText=hoje;
document.getElementById("sem").innerText=sem;
document.getElementById("com").innerText=com;

document.getElementById("tEstoque").innerHTML=tabela;

// gráfico

let top = Object.entries(carros).sort((a,b)=>b[1]-a[1]).slice(0,5);

// preencher tabela ranking
let tabelaRank = "";
top.forEach(r=>{
tabelaRank += `<tr><td>${r[0]}</td><td>${r[1]}</td></tr>`;
});
document.getElementById("rankingTabela").innerHTML = tabelaRank;

new Chart
(document.getElementById("grafico"),{
type:"bar",
data:{labels:top.map(x=>x[0]),datasets:[{data:top.map(x=>x[1])}]},
options:{plugins:{legend:{display:false}},scales:{x:{ticks:{color:"#fff"}},y:{ticks:{color:"#fff"}}}}
});

popularOS();
popularDatas();

}
});
}

function popularOS(){
let sel=document.getElementById("osSelect");
sel.innerHTML="<option>OS</option>";
[...new Set(dados.filter(r=>r[7] && reservado(r[3]) && r[8]).map(r=>r[8]))]
.sort((a,b)=>b-a)
.forEach(o=>sel.innerHTML+=`<option>${o}</option>`);
}

function buscarOS(){
let os=document.getElementById("osSelect").value;
let itens=dados.filter(r=>r[8]==os && reservado(r[3]));

let html="";
let pessoas=new Set();
let datas=new Set();

itens.forEach(r=>{
html+=`<tr><td>${r[4]}</td><td>${r[9]}</td><td>${r[7]}</td></tr>`;
pessoas.add(r[9]);
datas.add(r[7]);
});

document.getElementById("tOS").innerHTML=html;
document.getElementById("resumo").innerHTML=`<div class="card">OS ${os}<br>Peças: ${itens.length}<br>Resp: ${[...pessoas]}<br>Datas: ${[...datas]}</div>`;
}

function popularDatas(){
let sel=document.getElementById("dataSelect");
sel.innerHTML="<option>Data</option>";
[...new Set(dados.map(r=>r[7]).filter(Boolean))]
.sort((a,b)=> new Date(b.split("/").reverse().join("-")) - new Date(a.split("/").reverse().join("-")))
.forEach(d=>sel.innerHTML+=`<option>${d}</option>`);
}

function filtrarData(){
let d=document.getElementById("dataSelect").value;
let html="";
dados.forEach(r=>{
if(r[7]==d){
html+=`<tr><td>${r[4]}</td><td>${r[9]}</td><td>${r[7]}</td></tr>`;
}
});
document.getElementById("tMov").innerHTML=html;
}

carregar();

</script>

</body>
</html>
